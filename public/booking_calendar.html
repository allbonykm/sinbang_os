<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 관리 캘린더 - 신방한의원 OS</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --today-bg: #eff6ff;
            --today-border: #4f46e5;
            --naver-bg: #ecfdf5;
            --naver-text: #059669;
            --manual-bg: #f8fafc;
            --manual-text: #475569;
            --sunday-text: #ef4444;
            --saturday-text: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg-color); color: var(--text-main); padding: 20px; min-height: 100vh; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: white; padding: 15px 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--border-color); }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .header-right { display: flex; gap: 10px; }

        .title-area { display: flex; align-items: center; gap: 12px; }
        .title-area h1 { font-size: 22px; color: var(--text-main); font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .title-area h1 i { color: var(--primary-color); }

        .btn { padding: 9px 16px; border-radius: 10px; border: 1px solid var(--border-color); background: white; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; transition: all 0.2s; color: var(--text-main); }
        .btn:hover { background: #f1f5f9; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .btn-primary { background: var(--primary-color); color: white; border: none; }
        .btn-primary:hover { background: var(--secondary-color); color: white; }

        .current-month { font-size: 1.3rem; font-weight: 800; display: flex; align-items: center; gap: 15px; color: var(--text-main); }
        .current-month .btn { padding: 6px 12px; }
        
        .summary-badges { display: flex; gap: 10px; }
        .badge { padding: 6px 14px; border-radius: 25px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .badge-total { background: #e0e7ff; color: #4338ca; }
        .badge-naver { background: #dcfce7; color: #15803d; }
        .badge-manual { background: #f1f5f9; color: #475569; }

        .calendar-container { background: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid var(--border-color); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        
        .calendar-day-header { padding: 15px; text-align: center; font-weight: 700; font-size: 14px; background: #f8fafc; border-bottom: 2px solid var(--border-color); color: var(--text-muted); }
        .calendar-day-header:nth-child(1) { color: var(--sunday-text); }
        .calendar-day-header:nth-child(7) { color: var(--saturday-text); }

        .calendar-cell { min-height: 140px; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 8px 4px; position: relative; transition: all 0.2s; background: white; }
        .calendar-cell:nth-child(7n) { border-right: none; }
        .calendar-cell:hover { background: #fdfdfd; z-index: 5; box-shadow: inset 0 0 0 2px var(--primary-color); }
        .calendar-cell.other-month { background: #f8fafc; opacity: 0.4; pointer-events: none; }
        .calendar-cell.today { background: var(--today-bg); }
        
        .day-number { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: inline-block; width: 28px; height: 28px; text-align: center; line-height: 28px; border-radius: 50%; color: var(--text-main); }
        .calendar-cell.today .day-number { background: var(--today-border); color: white; }
        .calendar-cell:nth-child(7n+1) .day-number { color: var(--sunday-text); }
        .calendar-cell:nth-child(7n) .day-number { color: var(--saturday-text); }

        .booking-list { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; font-size: 10.5px; }
        .booking-item { 
            padding: 1px 2px; 
            border-radius: 4px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 2px;
            font-weight: 600;
            font-size: 10.5px;
        }
        .booking-item.naver { color: var(--naver-text); }
        .booking-item.manual { color: var(--manual-text); }

        .booking-time { font-weight: 800; min-width: 30px; color: inherit; opacity: 0.9; }

        .more-info { grid-column: span 2; font-size: 11px; color: var(--text-muted); padding: 4px 8px; cursor: pointer; text-align: right; font-weight: 600; }

        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; right:0; bottom: 0; background: rgba(15, 23, 42, 0.6); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; backdrop-filter: blur(4px); }
        .modal-content { background: white; border-radius: 20px; width: 100%; max-width: 500px; padding: 0; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); overflow: hidden; border: 1px solid var(--border-color); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 25px; border-bottom: 1px solid var(--border-color); background: #f8fafc; }
        .modal-header h3 { font-size: 18px; font-weight: 800; }
        .modal-close { cursor: pointer; font-size: 24px; color: var(--text-muted); }
        .modal-body { max-height: 500px; overflow-y: auto; padding: 10px 0; }
        .modal-booking-item { display: flex; justify-content: space-between; padding: 15px 25px; border-bottom: 1px solid #f1f5f9; align-items: center; }
        .modal-booking-info { display: flex; gap: 15px; align-items: center; }
        .modal-time { font-weight: 800; font-size: 15px; color: var(--primary-color); width: 50px; }
        .modal-name { font-weight: 700; font-size: 16px; }
        .modal-badge { font-size: 11px; padding: 4px 10px; border-radius: 6px; font-weight: 700; }
        .badge-n { background: #ecfdf5; color: #059669; }
        .badge-m { background: #f1f5f9; color: #475569; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <div class="title-area">
                <h1><i class="fas fa-calendar-check"></i> 예약 캘린더</h1>
            </div>
            <button class="btn" onclick="goToToday()">오늘</button>
            <div class="current-month">
                <button class="btn" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
                <span id="title-month">로딩 중...</span>
                <button class="btn" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
        <div class="header-right">
            <div class="summary-badges" id="summary-container">
                <span class="badge badge-total">총 <span id="summary-total">0</span>건</span>
                <span class="badge badge-naver">네이버 <span id="summary-naver">0</span></span>
                <span class="badge badge-manual">원내 <span id="summary-manual">0</span></span>
            </div>
            <button class="btn btn-primary" onclick="fetchBookingData()"><i class="fas fa-sync-alt"></i> 새로고침</button>
        </div>
    </div>

    <div class="calendar-container">
        <div class="calendar-grid">
            <div class="calendar-day-header">일요일</div>
            <div class="calendar-day-header">월요일</div>
            <div class="calendar-day-header">화요일</div>
            <div class="calendar-day-header">수요일</div>
            <div class="calendar-day-header">목요일</div>
            <div class="calendar-day-header">금요일</div>
            <div class="calendar-day-header">토요일</div>
        </div>
        <div class="calendar-grid" id="calendar-body">
            <!-- 날짜 셀들이 여기에 생성됩니다 -->
        </div>
    </div>

    <!-- 모달 등 생략 (동일) -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modal-title">예약 현황</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <ul id="modal-patient-list" style="list-style:none;"></ul>
            </div>
        </div>
    </div>

    <script>
        let currentYear, currentMonth;
        let bookingsData = {};

        function init() {
            const now = new Date();
            currentYear = now.getFullYear();
            currentMonth = now.getMonth() + 1;
            
            // 1. 먼저 빈 달력 틀을 그립니다. (데이터 로딩 전 시각적 피드백)
            renderCalendarCells(); 
            // 2. 데이터를 요청합니다.
            fetchBookingData();
        }

        async function fetchBookingData(silent = false) {
            try {
                const bodyEl = document.getElementById('calendar-body');
                if (!silent) bodyEl.style.opacity = '0.5';
                
                const res = await fetch(`/api/booking-calendar?year=${currentYear}&month=${currentMonth}`);
                const result = await res.json();

                if (result.success) {
                    bookingsData = result.bookings || {};
                    updateSummary(result.summary || {});
                    renderCalendarCells(); // 데이터 포함하여 다시 그리기
                }
                bodyEl.style.opacity = '1';
            } catch (error) {
                console.error('Fetch Error:', error);
                document.getElementById('calendar-body').style.opacity = '1';
            }
        }

        function updateSummary(summary) {
            document.getElementById('summary-total').textContent = summary.total || 0;
            document.getElementById('summary-naver').textContent = summary.naver || 0;
            document.getElementById('summary-manual').textContent = summary.manual || 0;
            document.getElementById('title-month').textContent = `${currentYear}년 ${currentMonth}월`;
        }

        function renderCalendarCells() {
            const body = document.getElementById('calendar-body');
            if (!body) return;
            body.innerHTML = '';

            const firstDay = new Date(currentYear, currentMonth - 1, 1);
            const lastDay = new Date(currentYear, currentMonth, 0);
            
            const startDayIdx = firstDay.getDay(); // 0(일) ~ 6(토)
            const prevMonthLastDay = new Date(currentYear, currentMonth - 1, 0).getDate();

            // 1. 이전 달 날짜 채우기
            for (let i = startDayIdx - 1; i >= 0; i--) {
                body.appendChild(createCell(prevMonthLastDay - i, true));
            }

            // 2. 이번 달 날짜 채우기
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

            for (let d = 1; d <= lastDay.getDate(); d++) {
                const dateStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isToday = dateStr === todayStr;
                body.appendChild(createCell(d, false, isToday, dateStr));
            }

            // 3. 다음 달 날짜 채우기 (7열 맞추기)
            const totalSoFar = body.children.length;
            const remaining = (7 - (totalSoFar % 7)) % 7;
            for (let i = 1; i <= remaining; i++) {
                body.appendChild(createCell(i, true));
            }
        }

        function createCell(day, isOtherMonth, isToday, dateStr) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell' + (isOtherMonth ? ' other-month' : '') + (isToday ? ' today' : '');
            
            const dayNum = document.createElement('span');
            dayNum.className = 'day-number';
            dayNum.textContent = day;
            cell.appendChild(dayNum);

            // 해당 날짜에 예약 데이터가 있으면 표시
            if (!isOtherMonth && dateStr && bookingsData[dateStr]) {
                const list = document.createElement('div');
                list.className = 'booking-list';
                
                const dayBookings = bookingsData[dateStr];
                const displayLimit = 8;
                dayBookings.slice(0, displayLimit).forEach(b => {
                    const item = document.createElement('div');
                    const isNaver = b.platform === 'naver';
                    item.className = `booking-item ${isNaver ? 'naver' : 'manual'}`;
                    item.innerHTML = `<span class="booking-time">${b.time}</span> ${b.name}`;
                    list.appendChild(item);
                });

                if (dayBookings.length > displayLimit) {
                    const more = document.createElement('div');
                    more.className = 'more-info';
                    more.textContent = `+ ${dayBookings.length - displayLimit}명...`;
                    list.appendChild(more);
                }

                cell.appendChild(list);
                cell.style.cursor = 'pointer';
                cell.onclick = () => showDetails(dateStr, dayBookings);
            }

            return cell;
        }

        function showDetails(date, bookings) {
            document.getElementById('modal-title').textContent = `${date} 예약 명단`;
            const list = document.getElementById('modal-patient-list');
            list.innerHTML = bookings.map(b => `
                <li class="modal-booking-item">
                    <div class="modal-booking-info">
                        <span class="modal-time">${b.time}</span>
                        <div>
                            <div class="modal-name">${b.name}</div>
                            <div style="font-size:12px;color:#64748b;">#${b.chartNo || '----'}</div>
                        </div>
                    </div>
                    <span class="modal-badge ${b.platform === 'naver' ? 'badge-n' : 'badge-m'}">${b.platform === 'naver' ? '네이버' : '원내'}</span>
                </li>
            `).join('');
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        
        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 12) { currentMonth = 1; currentYear++; }
            else if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            fetchBookingData();
        }

        function goToToday() {
            const now = new Date();
            currentYear = now.getFullYear();
            currentMonth = now.getMonth() + 1;
            fetchBookingData();
        }

        // 초기 실행
        init();
    </script>
</body>
</html>
